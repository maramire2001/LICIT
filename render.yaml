databases:
  - name: licit-ia-db
    databaseName: licitia
    user: licitia
    plan: free

services:
  - type: web
    name: licit-ia-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: licit-ia-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_EMAIL
        value: marioantonioramirezbarajas@gmail.com
      - key: BANK_CLABE
        value: "072580008762857436"
      - key: BANK_NOMBRE
        value: Banorte
      - key: BANK_TITULAR
        value: Mario Antonio Ramirez Barajas

  - type: web
    name: licit-ia-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.worker
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: licit-ia-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false

  - type: web
    name: licit-ia-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: free
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://wpsfleoqtwphyierabzl.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        value: sb_publishable_DL0tJh4VE0btL35sattoxg_BmLhY-ZQ
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: PORT
        value: "3000"
