services:
  - type: redis
    name: licit-ia-redis
    plan: free
    ipAllowList: []

  - type: web
    name: licit-ia-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: postgresql://postgres:Euncet2024%40@db.babeehjmieyhxmtxadhd.supabase.co:5432/postgres
      - key: REDIS_URL
        fromService:
          name: licit-ia-redis
          type: redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://licit-ia-frontend.onrender.com
      - key: ADMIN_EMAIL
        value: marioantonioramirezbarajas@gmail.com
      - key: BANK_CLABE
        value: "072580008762857436"
      - key: BANK_NOMBRE
        value: Banorte
      - key: BANK_TITULAR
        value: Mario Antonio Ramirez Barajas

  - type: worker
    name: licit-ia-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.worker
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        value: postgresql://postgres:Euncet2024%40@db.babeehjmieyhxmtxadhd.supabase.co:5432/postgres
      - key: REDIS_URL
        fromService:
          name: licit-ia-redis
          type: redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false

  - type: worker
    name: licit-ia-beat
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.beat
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        value: postgresql://postgres:Euncet2024%40@db.babeehjmieyhxmtxadhd.supabase.co:5432/postgres
      - key: REDIS_URL
        fromService:
          name: licit-ia-redis
          type: redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false

  - type: web
    name: licit-ia-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: free
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://babeehjmieyhxmtxadhd.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        value: sb_publishable_DL0tJh4VE0btL35sattoxg_BmLhY-ZQ
      - key: NEXT_PUBLIC_API_URL
        value: https://licit-ia-backend.onrender.com
      - key: PORT
        value: "3000"
